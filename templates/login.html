<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simpleSFTP - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #16213e;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #e94560;
            font-size: 1.8rem;
        }
        .logo p {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #aaa;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #0f3460;
            background: #0f3460;
            color: #eee;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #e94560;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .checkbox-group input {
            width: auto;
        }
        .checkbox-group label {
            margin: 0;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background: #e94560;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #ff6b6b; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error {
            background: #e9456033;
            border: 1px solid #e94560;
            color: #e94560;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }
        .error.show { display: block; }
        .toggle-mode {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #888;
        }
        .toggle-mode a {
            color: #e94560;
            cursor: pointer;
            text-decoration: none;
        }
        .toggle-mode a:hover { text-decoration: underline; }
        .hint {
            font-size: 0.75rem;
            color: #666;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>📁 simpleSFTP</h1>
            <p>Secure file transfer</p>
        </div>
        
        <div class="error" id="error-msg"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="remember">
                <label for="remember">Remember me on this device</label>
            </div>
            <button type="submit" id="submit-btn">Sign In</button>
        </form>
        
        <form id="register-form" class="hidden">
            <div class="form-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="reg-password2">Confirm Password</label>
                <input type="password" id="reg-password2" required>
            </div>
            <button type="submit" id="reg-btn">Create Account</button>
        </form>
        
        <div class="toggle-mode">
            <span id="toggle-text">No account? <a onclick="toggleMode()">Register</a></span>
        </div>
        
        <p class="hint">All SFTP credentials are encrypted with your password.</p>
    </div>

    <script>
        let isLoginMode = true;
        
        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
            document.getElementById('toggle-text').innerHTML = isLoginMode 
                ? 'No account? <a onclick="toggleMode()">Register</a>'
                : 'Have an account? <a onclick="toggleMode()">Sign In</a>';
            document.getElementById('error-msg').classList.remove('show');
        }
        
        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('show');
        }
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    remember: document.getElementById('remember').checked
                })
            });
            const data = await res.json();
            
            if (data.success) {
                window.location = data.redirect || '/';
            } else {
                showError(data.error || 'Login failed');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.disabled = true;
            btn.textContent = 'Creating...';
            
            const pw = document.getElementById('reg-password').value;
            const pw2 = document.getElementById('reg-password2').value;
            
            if (pw !== pw2) {
                showError('Passwords do not match');
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }
            
            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('reg-username').value,
                    password: pw
                })
            });
            const data = await res.json();
            
            if (data.success) {
                showError('Account created! Please sign in.');
                document.getElementById('error-msg').style.background = '#00aa0033';
                document.getElementById('error-msg').style.borderColor = '#00aa00';
                document.getElementById('error-msg').style.color = '#00aa00';
                toggleMode();
            } else {
                showError(data.error || 'Registration failed');
            }
            btn.disabled = false;
            btn.textContent = 'Create Account';
        });
    </script>
</body>
</html>
